<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .welcome-container {
      background: #e89292;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }
    .welcome-container h1 {
      color: #707f8f;
      margin-bottom: 20px;
    }
    .welcome-container p {
      margin-bottom: 30px;
      font-size: 16px;
      color: #333;
    }
    .welcome-container a {
      display: inline-block;
      padding: 10px 20px;
      background: #007BFF;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .welcome-container a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <h1>Welcome to GlowMatch shade</h1>
    <p>Your personalized Pakistani shade recommender is ready to help you find the perfect foundation and lipstick match.</p>
    <a href="index.html">Go to Homepage</a>
  </div>
</body>
</html>
